<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Labyrinth</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #c0c0c0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
      gap: 20px;
    }

    h1 {
      font-size: 1.6rem;
      letter-spacing: 0.15em;
      color: #C94747;
      text-transform: uppercase;
    }

    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 32px;
      align-items: center;
      justify-content: center;
      background: #2e2e2e;
      border-radius: 12px;
      padding: 16px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    label {
      font-size: 0.8rem;
      color: #aaaaaa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 4px;
      border-radius: 2px;
      background: #555555;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #C94747;
    }

    .value-label {
      font-size: 0.85rem;
      min-width: 48px;
      text-align: right;
      color: #c0c0c0;
    }

    button {
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    select {
      background: #3a3a3a;
      color: #e0e0e0;
      border: 1px solid #555555;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.88rem;
      cursor: pointer;
      outline: none;
    }
    select:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-generate { background: #C94747; color: #f0f0f0; }
    #btn-solve    { background: #9E3C3C; color: #f0f0f0; }

    #maze-canvas, #maze-canvas-3d {
      border-radius: 8px;
      display: block;
    }

    #maze-canvas-3d { display: none; }

    #btn-toggle-view { background: #555555; color: #f0f0f0; }

    #legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      justify-content: center;
      font-size: 0.78rem;
      color: #aaaaaa;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Boutons fixes navigation ── */
    #btn-open-cube, #btn-open-play {
      position: fixed;
      top: 16px;
      z-index: 100;
      background: #2e2e2e;
      color: #C94747;
      border: 1.5px solid #C94747;
      padding: 7px 14px;
      font-size: 0.82rem;
    }
    #btn-open-cube { left: 16px; }
    #btn-open-play { right: 16px; }

    /* ── Section Cube 3D ── */
    #main-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
    }

    #cube-section {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    #cube-section h2 {
      font-size: 1.3rem;
      color: #C94747;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    #cube-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      align-items: center;
      justify-content: center;
      background: #2e2e2e;
      border-radius: 12px;
      padding: 14px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    #canvas-cube { border-radius: 8px; display: block; }

    #btn-cube-gen   { background: #C94747; color: #f0f0f0; }
    #btn-cube-solve { background: #9E3C3C; color: #f0f0f0; }

    /* ── Section Play ── */
    #play-section {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    #play-section h2 {
      font-size: 1.3rem;
      color: #C94747;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    #play-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      align-items: center;
      justify-content: center;
      background: #2e2e2e;
      border-radius: 12px;
      padding: 14px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    #play-steps-wrap {
      font-size: 1rem;
      color: #c0c0c0;
      letter-spacing: 0.05em;
    }

    #play-steps {
      color: #C94747;
      font-weight: 700;
      font-size: 1.2rem;
    }

    #play-canvas { border-radius: 8px; display: block; }

    #btn-play-new { background: #C94747; color: #f0f0f0; }

    #play-msg {
      display: none;
      font-size: 1.4rem;
      font-weight: 700;
      color: #ff8a65;
      letter-spacing: 0.08em;
    }

    #play-info {
      font-size: 0.78rem;
      color: #666;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- Boutons de navigation fixes -->
  <button id="btn-open-cube">Cube 3D</button>
  <button id="btn-open-play">Play</button>

  <!-- ── Section principale (2D / 3D jardin) ── -->
  <div id="main-section">
  <h1>Labyrinth</h1>

  <div id="controls">
    <div class="control-group">
      <label for="size-slider">Size</label>
      <div class="slider-row">
        <input type="range" id="size-slider" min="5" max="60" value="20" />
        <span class="value-label" id="size-label">20×20</span>
      </div>
    </div>

    <div class="control-group">
      <label for="openings-slider">Extra openings</label>
      <div class="slider-row">
        <input type="range" id="openings-slider" min="0" max="50" value="0" />
        <span class="value-label" id="openings-label">0</span>
      </div>
    </div>

    <div class="control-group">
      <label for="speed-slider">Speed (delay)</label>
      <div class="slider-row">
        <input type="range" id="speed-slider" min="0" max="100" value="20" />
        <span class="value-label" id="speed-label">20 ms</span>
      </div>
    </div>

    <div class="control-group">
      <label for="gen-select">Generator</label>
      <select id="gen-select">
        <option value="binary-tree">Binary Tree</option>
        <option value="hunt-and-kill">Hunt &amp; Kill</option>
        <option value="prim">Prim</option>
        <option value="recursive-backtracker">Recursive Backtracker</option>
        <option value="recursive-division">Recursive Division</option>
        <option value="kruskal">Kruskal</option>
      </select>
    </div>

    <div class="control-group">
      <label for="solver-select">Solver</label>
      <select id="solver-select">
        <option value="astar">A*</option>
        <option value="bfs">BFS</option>
        <option value="dfs">DFS</option>
      </select>
    </div>

    <button id="btn-generate">Generate</button>
    <button id="btn-solve">Solve</button>
    <button id="btn-toggle-view">Switch to 3D</button>
  </div>

  <canvas id="maze-canvas"></canvas>
  <canvas id="maze-canvas-3d"></canvas>

  <div id="legend">
    <div class="legend-item"><div class="dot" style="background:#81d4fa"></div> Start</div>
    <div class="legend-item"><div class="dot" style="background:#9E3C3C"></div> End</div>
    <div class="legend-item"><div class="dot" style="background:#90caf9"></div> Frontier</div>
    <div class="legend-item"><div class="dot" style="background:#9FCF65"></div> Open</div>
    <div class="legend-item"><div class="dot" style="background:#65ADCF"></div> Closed</div>
    <div class="legend-item"><div class="dot" style="background:#C94747"></div> Path</div>
  </div>

  </div> <!-- /main-section -->

  <!-- ── Section Cube 3D ── -->
  <div id="cube-section">
    <h2 id="cube-title">Cube 3D — 10×10×10</h2>

    <div id="cube-controls">
      <div class="control-group">
        <label for="cube-size">Size</label>
        <div class="slider-row">
          <input type="range" id="cube-size" min="5" max="20" value="10" />
          <span class="value-label" id="cube-size-label">10×10×10</span>
        </div>
      </div>
      <div class="control-group">
        <label for="cube-openings">Extra openings</label>
        <div class="slider-row">
          <input type="range" id="cube-openings" min="0" max="100" value="0" />
          <span class="value-label" id="cube-openings-label">0</span>
        </div>
      </div>
      <div class="control-group">
        <label for="cube-speed">Speed (delay)</label>
        <div class="slider-row">
          <input type="range" id="cube-speed" min="0" max="100" value="10" />
          <span class="value-label" id="cube-speed-label">10 ms</span>
        </div>
      </div>
      <button id="btn-cube-gen">Generate</button>
      <button id="btn-cube-solve">Solve</button>
    </div>

    <canvas id="canvas-cube"></canvas>
  </div>

  <!-- ── Section Play ── -->
  <div id="play-section">
    <h2 id="play-title">Labyrinth — Play</h2>

    <div id="play-controls">
      <div id="play-steps-wrap">Steps : <span id="play-steps">0</span></div>
      <button id="btn-play-new">New Game</button>
    </div>

    <div id="play-msg"></div>
    <canvas id="play-canvas"></canvas>

    <div id="play-info">
      Move : <strong>ZQSD</strong> or <strong>Arrow keys</strong> &nbsp;·&nbsp;
      You only see cells within 3 steps &nbsp;·&nbsp;
      Reach the <span style="color:#ff8a65">★</span> to win
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
