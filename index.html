<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Labyrinth</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #8088a0;
      color: #6d6d6d;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
      gap: 20px;
    }

    h1 {
      font-size: 1.6rem;
      letter-spacing: 0.15em;
      color: #2a49f7;
      text-transform: uppercase;
    }

    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 32px;
      align-items: center;
      justify-content: center;
      background: #c0c0c0;
      border-radius: 12px;
      padding: 16px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    label {
      font-size: 0.8rem;
      color: #213e4d;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 120px;
      height: 4px;
      border-radius: 2px;
      background: #4a4a4d;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #0a0a0b;
    }

    .value-label {
      font-size: 0.85rem;
      min-width: 48px;
      text-align: right;
      color: #191c2d;
    }

    button {
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    select {
      background: #ffffff;
      color: #050505;
      border: 1px solid #c5cae9;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.88rem;
      cursor: pointer;
      outline: none;
    }
    select:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-generate { background: #81d4fa; color: #37474f; }
    #btn-solve    { background: #b3d9ff; color: #37474f; }

    #maze-canvas {
      border-radius: 8px;
      display: block;
    }

    #legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      justify-content: center;
      font-size: 0.78rem;
      color: #1b1f21;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <h1>Labyrinth</h1>

  <div id="controls">
    <div class="control-group">
      <label for="size-slider">Size</label>
      <div class="slider-row">
        <input type="range" id="size-slider" min="5" max="60" value="20" />
        <span class="value-label" id="size-label">20×20</span>
      </div>
    </div>

    <div class="control-group">
      <label for="speed-slider">Speed (delay)</label>
      <div class="slider-row">
        <input type="range" id="speed-slider" min="0" max="100" value="20" />
        <span class="value-label" id="speed-label">20 ms</span>
      </div>
    </div>

    <div class="control-group">
      <label for="gen-select">Generator</label>
      <select id="gen-select">
        <option value="binary-tree">Binary Tree</option>
        <option value="hunt-and-kill">Hunt &amp; Kill</option>
        <option value="prim">Prim</option>
        <option value="recursive-backtracker">Recursive Backtracker</option>
        <option value="recursive-division">Recursive Division</option>
        <option value="kruskal">Kruskal</option>
      </select>
    </div>

    <div class="control-group">
      <label for="solver-select">Solver</label>
      <select id="solver-select">
        <option value="astar">A*</option>
        <option value="bfs">BFS</option>
        <option value="dfs">DFS</option>
      </select>
    </div>

    <button id="btn-generate">Generate</button>
    <button id="btn-solve">Solve</button>
  </div>

  <canvas id="maze-canvas"></canvas>

  <div id="legend">
    <div class="legend-item"><div class="dot" style="background:#76adc7"></div> Start</div>
    <div class="legend-item"><div class="dot" style="background:#be6dcc"></div> End</div>
    <div class="legend-item"><div class="dot" style="background:#5f93c7"></div> Frontier</div>
    <div class="legend-item"><div class="dot" style="background:#fff59d"></div> Open</div>
    <div class="legend-item"><div class="dot" style="background:#e57c86"></div> Closed</div>
    <div class="legend-item"><div class="dot" style="background:#82c785"></div> Path</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
