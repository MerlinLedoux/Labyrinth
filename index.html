<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Labyrinth</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
      gap: 20px;
    }

    h1 {
      font-size: 1.6rem;
      letter-spacing: 0.15em;
      color: #ffd600;
      text-transform: uppercase;
    }

    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 32px;
      align-items: center;
      justify-content: center;
      background: #16213e;
      border-radius: 12px;
      padding: 16px 24px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    label {
      font-size: 0.8rem;
      color: #90a4ae;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 120px;
      height: 4px;
      border-radius: 2px;
      background: #0f3460;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffd600;
    }

    .value-label {
      font-size: 0.85rem;
      min-width: 48px;
      text-align: right;
      color: #ffd600;
    }

    button {
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-generate { background: #29b6f6; color: #0d0d1a; }
    #btn-solve    { background: #ffd600; color: #0d0d1a; }

    #maze-canvas {
      border-radius: 8px;
      display: block;
    }

    #legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      justify-content: center;
      font-size: 0.78rem;
      color: #90a4ae;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <h1>Labyrinth</h1>

  <div id="controls">
    <div class="control-group">
      <label for="size-slider">Taille</label>
      <div class="slider-row">
        <input type="range" id="size-slider" min="5" max="60" value="20" />
        <span class="value-label" id="size-label">20×20</span>
      </div>
    </div>

    <div class="control-group">
      <label for="speed-slider">Vitesse (délai)</label>
      <div class="slider-row">
        <input type="range" id="speed-slider" min="0" max="100" value="20" />
        <span class="value-label" id="speed-label">20 ms</span>
      </div>
    </div>

    <button id="btn-generate">Générer</button>
    <button id="btn-solve" >Résoudre (A*)</button>
  </div>

  <canvas id="maze-canvas"></canvas>

  <div id="legend">
    <div class="legend-item"><div class="dot" style="background:#29b6f6"></div> Départ</div>
    <div class="legend-item"><div class="dot" style="background:#ab47bc"></div> Arrivée</div>
    <div class="legend-item"><div class="dot" style="background:#0f3460"></div> Frontière (Prim)</div>
    <div class="legend-item"><div class="dot" style="background:#4caf50"></div> Ouvert (A*)</div>
    <div class="legend-item"><div class="dot" style="background:#e53935"></div> Fermé (A*)</div>
    <div class="legend-item"><div class="dot" style="background:#ffd600"></div> Chemin</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
